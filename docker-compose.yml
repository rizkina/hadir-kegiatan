services:
  # Aplikasi Utama (FrankenPHP + Octane)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hadir_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SERVER_NAME=:8000
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hadir_network
    command: []

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hadir_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - app
    command: ["php", "artisan", "queue:work", "redis", "--tries=3", "--timeout=90"]
    networks:
      - hadir_network

  # Scheduler (Untuk Backup Database Otomatis)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hadir_scheduler
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - app
    command: ["php", "artisan", "schedule:work"]
    networks:
      - hadir_network

  # Database (PostgreSQL 16)
  postgres:
    image: postgres:16-alpine
    container_name: hadir_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-hadir}
      POSTGRES_USER: ${DB_USERNAME:-hadir_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-S3cR3tP@ssw0rd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hadir_network

  # Redis (Cache & Queue)
  redis:
    image: redis:7-alpine
    container_name: hadir_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hadir_network

networks:
  hadir_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: